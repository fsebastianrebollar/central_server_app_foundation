<script>
const T = {
    password_changed: "{{ _('Password changed.') }}",
    failed: "{{ _('Failed') }}",
    request_failed: "{{ _('Request failed') }}",
    user_created: "{{ _('User created.') }}",
    select_a_role: "{{ _('Select a role') }}",
    role_updated: "{{ _('Role updated.') }}",
    user_deleted: "{{ _('User deleted.') }}",
};
let _targetUser = '';

function _status(id, msg, isError) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'db-status ' + (isError ? 'db-status-error' : 'db-status-ok');
}

/* === Own Password === */
function openOwnPasswordModal() {
    document.getElementById('own-pw-current').value = '';
    document.getElementById('own-pw-new').value = '';
    document.getElementById('own-pw-confirm').value = '';
    document.getElementById('own-pw-status').textContent = '';
    document.getElementById('own-pw-modal').classList.add('modal-open');
}

function closeOwnPasswordModal() {
    document.getElementById('own-pw-modal').classList.remove('modal-open');
}

function saveOwnPassword() {
    const current = document.getElementById('own-pw-current').value;
    const pw = document.getElementById('own-pw-new').value;
    const confirm = document.getElementById('own-pw-confirm').value;
    _status('own-pw-status', '', false);
    fetch('/api/user/change-password', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({current_password: current, new_password: pw, confirm_password: confirm})
    }).then(r => r.json().then(d => ({ok: r.ok, data: d}))).then(({ok, data}) => {
        if (ok && data.ok) {
            _status('own-pw-status', T.password_changed, false);
            setTimeout(closeOwnPasswordModal, 800);
        } else {
            _status('own-pw-status', data.error || T.failed, true);
        }
    }).catch(() => _status('own-pw-status', T.request_failed, true));
}

/* === Create User === */
function openCreateUserModal() {
    document.getElementById('create-username').value = '';
    document.getElementById('create-password').value = '';
    document.getElementById('create-user-status').textContent = '';
    document.getElementById('create-user-modal').classList.add('modal-open');
}

function closeCreateUserModal() {
    document.getElementById('create-user-modal').classList.remove('modal-open');
}

function saveCreateUser() {
    const username = document.getElementById('create-username').value.trim();
    const password = document.getElementById('create-password').value;
    _status('create-user-status', '', false);
    fetch('/api/admin/users/create', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username, password})
    }).then(r => r.json().then(d => ({ok: r.ok, data: d}))).then(({ok, data}) => {
        if (ok && data.ok) {
            _status('create-user-status', T.user_created, false);
            setTimeout(() => location.reload(), 600);
        } else {
            _status('create-user-status', data.error || T.failed, true);
        }
    }).catch(() => _status('create-user-status', T.request_failed, true));
}

/* === Change Role === */
function openRoleModal(username, currentRole) {
    _targetUser = username;
    document.getElementById('role-modal-user').textContent = username;
    document.getElementById('role-status').textContent = '';
    const radios = document.querySelectorAll('input[name="user_role"]');
    radios.forEach(r => { r.checked = (r.value === currentRole); });
    document.getElementById('role-modal').classList.add('modal-open');
}

function closeRoleModal() {
    document.getElementById('role-modal').classList.remove('modal-open');
}

function saveRole() {
    const selected = document.querySelector('input[name="user_role"]:checked');
    if (!selected) { _status('role-status', T.select_a_role, true); return; }
    _status('role-status', '', false);
    fetch('/api/admin/users/' + encodeURIComponent(_targetUser) + '/role', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({role: selected.value})
    }).then(r => r.json().then(d => ({ok: r.ok, data: d}))).then(({ok, data}) => {
        if (ok && data.ok) {
            _status('role-status', T.role_updated, false);
            const row = document.querySelector(`.admin-user-row[data-username="${_targetUser}"]`);
            if (row) {
                const badge = row.querySelector('.admin-badge');
                badge.textContent = selected.value;
                badge.className = 'admin-badge admin-badge-' + selected.value;
                badge.dataset.role = selected.value;
                const roleBtn = row.querySelector('.admin-btn-change[title="Change role"]');
                if (roleBtn) roleBtn.setAttribute('onclick',
                    `openRoleModal('${_targetUser}', '${selected.value}')`);
            }
            setTimeout(closeRoleModal, 600);
        } else {
            _status('role-status', data.error || T.failed, true);
        }
    }).catch(() => _status('role-status', T.request_failed, true));
}

/* === Admin Change Password === */
function openAdminPasswordModal(username) {
    _targetUser = username;
    document.getElementById('admin-pw-modal-user').textContent = username;
    document.getElementById('admin-pw-new').value = '';
    document.getElementById('admin-pw-status').textContent = '';
    document.getElementById('admin-pw-modal').classList.add('modal-open');
}

function closeAdminPasswordModal() {
    document.getElementById('admin-pw-modal').classList.remove('modal-open');
}

function saveAdminPassword() {
    const pw = document.getElementById('admin-pw-new').value;
    _status('admin-pw-status', '', false);
    fetch('/api/admin/users/' + encodeURIComponent(_targetUser) + '/change-password', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({new_password: pw})
    }).then(r => r.json().then(d => ({ok: r.ok, data: d}))).then(({ok, data}) => {
        if (ok && data.ok) {
            _status('admin-pw-status', T.password_changed, false);
            setTimeout(closeAdminPasswordModal, 800);
        } else {
            _status('admin-pw-status', data.error || T.failed, true);
        }
    }).catch(() => _status('admin-pw-status', T.request_failed, true));
}

/* === Delete User === */
function openDeleteModal(username) {
    _targetUser = username;
    document.getElementById('delete-modal-user').textContent = username;
    document.getElementById('delete-status').textContent = '';
    document.getElementById('delete-modal').classList.add('modal-open');
}

function closeDeleteModal() {
    document.getElementById('delete-modal').classList.remove('modal-open');
}

function confirmDelete() {
    _status('delete-status', '', false);
    fetch('/api/admin/users/' + encodeURIComponent(_targetUser) + '/delete', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'}
    }).then(r => r.json().then(d => ({ok: r.ok, data: d}))).then(({ok, data}) => {
        if (ok && data.ok) {
            _status('delete-status', T.user_deleted, false);
            const row = document.querySelector(`.admin-user-row[data-username="${_targetUser}"]`);
            if (row) row.remove();
            setTimeout(closeDeleteModal, 600);
        } else {
            _status('delete-status', data.error || T.failed, true);
        }
    }).catch(() => _status('delete-status', T.request_failed, true));
}
</script>
